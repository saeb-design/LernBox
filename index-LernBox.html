<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="LernBox" id="lernbox-title"/>
  <meta name="theme-color" content="#0f0c29"/>
  <script>
  // ساخت آیکون لوگو به صورت Canvas و تبدیل به PNG برای PWA
  (function(){
    const canvas = document.createElement('canvas');
    canvas.width = 512; canvas.height = 512;
    const ctx = canvas.getContext('2d');

    // پس‌زمینه گرد
    ctx.fillStyle = '#0d0d1a';
    ctx.beginPath();
    ctx.roundRect(0, 0, 512, 512, 80);
    ctx.fill();

    // رسم لوگو مکعبی — مقیاس 512px
    const cx = 256, scale = 8.5;
    const layers = [
      { y:2,  y2:10, y3:18, fill:'#56CCF2' },
      { y:20, y2:12, y3:17, y4:25, y5:17, y6:12, fill:'#2F80ED', mid:true },
      { y:27, y2:19, y3:24, y4:32, y5:24, y6:19, fill:'#1A56A0', mid:true },
      { y:34, y2:26, y3:31, y4:39, y5:31, y6:26, fill:'#124688', mid:true },
    ];

    function pt(x, y){ return [cx + (x-19)*scale, 80 + y*scale]; }

    // لایه اول (بالا)
    ctx.fillStyle = '#56CCF2';
    ctx.beginPath();
    let p = pt(19,2); ctx.moveTo(p[0],p[1]);
    p = pt(36,10); ctx.lineTo(p[0],p[1]);
    p = pt(19,18); ctx.lineTo(p[0],p[1]);
    p = pt(2,10);  ctx.lineTo(p[0],p[1]);
    ctx.closePath(); ctx.fill();

    // لایه دوم
    ctx.fillStyle = '#2F80ED';
    ctx.beginPath();
    p = pt(19,20); ctx.moveTo(p[0],p[1]);
    p = pt(36,12); ctx.lineTo(p[0],p[1]);
    p = pt(36,17); ctx.lineTo(p[0],p[1]);
    p = pt(19,25); ctx.lineTo(p[0],p[1]);
    p = pt(2,17);  ctx.lineTo(p[0],p[1]);
    p = pt(2,12);  ctx.lineTo(p[0],p[1]);
    ctx.closePath(); ctx.fill();

    // لایه سوم
    ctx.fillStyle = '#1A56A0';
    ctx.beginPath();
    p = pt(19,27); ctx.moveTo(p[0],p[1]);
    p = pt(36,19); ctx.lineTo(p[0],p[1]);
    p = pt(36,24); ctx.lineTo(p[0],p[1]);
    p = pt(19,32); ctx.lineTo(p[0],p[1]);
    p = pt(2,24);  ctx.lineTo(p[0],p[1]);
    p = pt(2,19);  ctx.lineTo(p[0],p[1]);
    ctx.closePath(); ctx.fill();

    // لایه چهارم
    ctx.fillStyle = '#124688';
    ctx.beginPath();
    p = pt(19,34); ctx.moveTo(p[0],p[1]);
    p = pt(36,26); ctx.lineTo(p[0],p[1]);
    p = pt(36,31); ctx.lineTo(p[0],p[1]);
    p = pt(19,39); ctx.lineTo(p[0],p[1]);
    p = pt(2,31);  ctx.lineTo(p[0],p[1]);
    p = pt(2,26);  ctx.lineTo(p[0],p[1]);
    ctx.closePath(); ctx.fill();

    // متن LernBox
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Lern
    ctx.font = 'bold 120px Arial, sans-serif';
    ctx.strokeStyle = '#0066bb';
    ctx.lineWidth = 8;
    ctx.strokeText('Lern', cx - 60, 410);
    ctx.fillStyle = '#0066bb';
    ctx.fillText('Lern', cx - 60, 410);

    // Box
    ctx.strokeStyle = '#5533dd';
    ctx.lineWidth = 8;
    ctx.strokeText('Box', cx + 100, 410);
    ctx.fillStyle = '#5533dd';
    ctx.fillText('Box', cx + 100, 410);

    const png = canvas.toDataURL('image/png');

    // apple-touch-icon
    const link180 = document.createElement('link');
    link180.rel = 'apple-touch-icon';
    link180.href = png;
    document.head.appendChild(link180);

    // favicon
    const linkFav = document.createElement('link');
    linkFav.rel = 'icon';
    linkFav.type = 'image/png';
    linkFav.href = png;
    document.head.appendChild(linkFav);

    // manifest برای PWA
    const manifest = {
      name: 'LernBox',
      short_name: 'LernBox',
      description: 'جعبه لایتنر هوشمند آلمانی',
      start_url: '/',
      display: 'standalone',
      background_color: '#0d0d1a',
      theme_color: '#0f0c29',
      orientation: 'portrait',
      icons: [
        { src: png, sizes: '512x512', type: 'image/png', purpose: 'any maskable' }
      ]
    };
    const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
    const manifestUrl = URL.createObjectURL(blob);
    const linkMan = document.createElement('link');
    linkMan.rel = 'manifest';
    linkMan.href = manifestUrl;
    document.head.appendChild(linkMan);
  })();
  </script>

    /* Header */

    /* Main */

    /* Cards */

    .cefr-badge{font-size:10px;background:rgba(167,139,250,0.2);color:#c4b5fd;padding:1px 5px;border-radius:4px;font-weight:700;}

    /* Folder */
    .folder-card{background:rgba(255,255,255,0.04);border:1px solid rgba(167,139,250,0.15);border-radius:12px;padding:14px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}

  </style>
</head>
<body>

<script>
// ═══════════════════════════════════════════════════
// STATE & STORAGE
// ═══════════════════════════════════════════════════
const SK = "lernbox_v3_cards", SS = "lernbox_v3_settings", SF = "lernbox_v3_folders";
let cards = [], folders = [], settings = {lang:"fa"};
let puterReady = false, puterUser = null;
let currentTab = "study";
let studyIdx = 0, studyFlipped = false, studyReversed = false;
let aiResults = {}, aiActiveTab = "";
let askOpen = false;
let extractItems = [], extractSelected = {};
let extractMode = 'words'; // 'words' or 'sentences'
let activeFolder = null;

function loadData() {
  try { cards = JSON.parse(localStorage.getItem(SK)||"[]"); } catch { cards = []; }
  try { folders = JSON.parse(localStorage.getItem(SF)||"[]"); } catch { folders = []; }
  try { settings = {...{lang:"fa"}, ...JSON.parse(localStorage.getItem(SS)||"{}")}; } catch { settings = {lang:"fa"}; }
}
function saveCards() { localStorage.setItem(SK, JSON.stringify(cards)); }
function saveFolders() { localStorage.setItem(SF, JSON.stringify(folders)); }
function saveSettings() { localStorage.setItem(SS, JSON.stringify(settings)); }

function today() { return new Date().toISOString().split("T")[0]; }
function isDue(c) { return c.nextDate <= today(); }
function dueCards() { return cards.filter(isDue); }

const BOX_INTERVALS = [0,1,3,7,14,30];
function getNextReview(box, result) {
  if(result === "again") return {box:1, nextDate:today()};
  const nb = result==="easy"?Math.min(box+2,5):result==="good"?Math.min(box+1,5):Math.max(box-1,1);
  const d = new Date(); d.setDate(d.getDate()+BOX_INTERVALS[nb]);
  return {box:nb, nextDate:d.toISOString().split("T")[0]};
}

// ═══════════════════════════════════════════════════
// PUTER / AI
// ═══════════════════════════════════════════════════
function initPuter() {
  const check = () => {
    if(typeof puter !== "undefined" && puter.ai) {
      puterReady = true;
      const b=document.getElementById("ai-badge-settings");
      if(b){b.style.color="#34d399";b.style.background="rgba(52,211,153,0.1)";b.style.borderColor="rgba(52,211,153,0.3)";b.textContent="🟢 متصل به Puter AI";}
      return true;
    }
    return false;
  };
  if(!check()) { const t = setInterval(()=>{ if(check()) clearInterval(t); }, 500); }
}

async function askAI(prompt) {
  if(!puterReady) throw new Error("سیستم AI آماده نیست");
  const res = await puter.ai.chat(prompt, {model:"gpt-4o-mini"});
  if(typeof res === "string") return res;
  const text = res?.message?.content || res?.text || res?.toString() || "";
  if(text) return text;
  throw new Error("پاسخ خالی");
}




// ═══════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════
function switchTab(name) {
  currentTab = name;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("tab-"+name).classList.add("active");
  const navBtns = document.querySelectorAll(".nav-btn");
  const tabs = ["study","cards","add","extract","verbs","settings"];
  navBtns[tabs.indexOf(name)].classList.add("active");
  render();
}

function updateStats() {
  document.getElementById("stat-total").textContent = cards.length;
  document.getElementById("stat-due").textContent = dueCards().length;
  document.getElementById("stat-mastered").textContent = cards.filter(c=>c.box===5).length;
}

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
function render() {
  updateStats();
  if(currentTab === "study") renderStudy();
  if(currentTab === "cards") renderCards();
  if(currentTab === "add") renderAdd();
  if(currentTab === "extract") renderExtract();
  if(currentTab === "verbs") renderVerbs();
  if(currentTab === "settings") renderSettings();
}

function e(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v]) => {
    if(k === "style" && typeof v === "object") Object.assign(el.style, v);
    else if(k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if(k === "class") el.className = v;
    else if(k === "html") el.innerHTML = v;
    else el.setAttribute(k, v);
  });
  children.flat().forEach(c => { if(c != null) el.append(typeof c === "string" ? c : c); });
  return el;
}

function boxBadge(box) {
  const colors = {1:"#ef4444",2:"#f97316",3:"#a855f7",4:"#3b82f6",5:"#22c55e"};
  const c = colors[box] || "#fff";
  const el = document.createElement("span");
  el.className = "box-badge";
  el.style.background = c+"22";
  el.style.border = "1px solid "+c+"55";
  el.style.color = c;
  el.textContent = "جعبه "+box;
  return el;
}

// ═══════════════════════════════════════════════════
// STUDY TAB
// ═══════════════════════════════════════════════════
function renderStudy() {
  const due = dueCards();
  const isLt = document.getElementById("app")?.getAttribute("data-theme")==="light";
  const tab = document.getElementById("tab-study");
  tab.innerHTML = "";
  if(!due.length) {
    tab.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:380px;gap:10px;"><div style="font-size:52px">🎉</div><div style="font-size:16px;font-weight:700;color:var(--primary);text-align:center">عالیه! همه کارت‌ها رو مرور کردی.</div></div>';
    return;
  }
  if(studyIdx >= due.length) studyIdx = 0;
  const card = due[studyIdx];
  const front = studyReversed ? card.translation : card.german;
  const back = studyReversed ? card.german : card.translation;

  // Top bar
  const topBar = e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"13px"}},
    e("span",{style:{fontSize:"11px",color:isLt?"#111130":"rgba(255,255,255,0.6)"}},(studyIdx+1)+"/"+due.length+" مرور امروز"),
    e("div",{style:{display:"flex",gap:"7px",alignItems:"center"}},

async function callAI(type, card) {
  aiResults.__loading = true; aiResults.__err = ""; aiActiveTab = type;
  renderStudy();
  try {
    let prompt;
    if(type === "conjugate") {
      prompt = 'You are a German grammar expert. The word is: "' + card.german + '". STEP 1: Is this a verb? Reply YES or NO on first line. STEP 2: If YES, return ONLY a raw HTML table (no markdown) with columns Person/Praesens/Praeteritum/Perfekt for rows ich/du/er-sie-es/wir/ihr/sie-Sie. Add one line before table: MEANINGS: [Persian meanings]. Add one line after: Partizip II: ... (haben/sein). If NO, return only: NOT_A_VERB';
    } else if(type === "grammar") {
      prompt = 'گرامر کلمه "' + card.german + '" را به فارسی توضیح بده. آرتیکل (برای اسم) یا نوع فعل (برای فعل) و نکات مهم گرامری را بنویس. فقط فارسی پاسخ بده.';
    } else if(type === "advanced") {
      prompt = 'کلمه "' + card.german + '" معانی زیر را دارد: ' + card.translation + '\n۳ جمله پیچیده و محاوره‌ای آلمانی (سطح B2-C1) با این کلمه بنویس (با ترجمه فارسی در پرانتز). فقط فارسی پاسخ بده.';
    } else {
      prompt = 'کلمه "' + card.german + '" معانی زیر را دارد: ' + card.translation + '\nبرای هر معنی جداگانه یک جمله کاربردی آلمانی بنویس (با ترجمه فارسی در پرانتز).\nفرمت:\n📌 معنی: [معنی فارسی]\nجمله: [جمله آلمانی] ([ترجمه فارسی])\n---\nفقط فارسی پاسخ بده.';
    }
    const res = await askAI(prompt);
    const cleaned = res.replace(/```html|```/g,"").trim();
    if(type==="conjugate") {
      if(cleaned.includes("NOT_A_VERB") || cleaned.trim().startsWith("NO")) {
        aiResults[type] = "⚠️ این کلمه یک فعل نیست و قابل صرف کردن نمی‌باشد.";
      } else {
        aiResults[type] = cleaned.replace(/^YES\s*/i,"").trim();
      }
    } else {
      aiResults[type] = cleaned;
    }
  } catch(err) {
    aiResults.__err = "خطا: " + err.message;
  }
  aiResults.__loading = false;
  renderStudy();
}

async function doAskCard(card, q) {
  if(!q.trim()) return;
  aiResults.__loading = true; aiResults.__ask = "";
  renderStudy();
  try {
    const res = await askAI('کاربر درباره کلمه آلمانی "' + card.german + '" (به فارسی: ' + card.translation + ') این سوال را دارد:\n"' + q + '"\nلطفاً پاسخ کامل و دقیق به فارسی بده.');
    aiResults.__ask = res.replace(/```/g,"").trim();
  } catch(err) {
    aiResults.__ask = "خطا: " + err.message;
  }
  aiResults.__loading = false;
  renderStudy();
}

async function handleSRT(e_) {
  const file = e_.target.files[0]; if(!file) return;
  const raw = await file.text();
  const cleaned = raw.replace(/\d+\n\d{2}:\d{2}:\d{2}[,\.]\d{3}\s*-->\s*\d{2}:\d{2}:\d{2}[,\.]\d{3}\n/g,"")
    .replace(/<[^>]+>/g,"").replace(/\{[^}]+\}/g,"").replace(/^\d+$/gm,"").replace(/\n{3,}/g,"\n\n").trim();
  extractText = cleaned;
  if(!extractFolder) extractFolder = file.name.replace(/\.(srt|vtt|txt)$/i,"").slice(0,40);
  renderExtract();
  e_.target.value="";
}

async function handlePDF(e_) {
  const file = e_.target.files[0]; if(!file) return;
  try {
    if(!window.pdfjsLib) {
      await new Promise((res,rej)=>{
        const s=document.createElement("script");
        s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
        s.onload=res;s.onerror=rej;document.head.appendChild(s);
      });
      window.pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    }
    const pdf = await window.pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;
    let txt="";
    for(let i=1;i<=pdf.numPages;i++){const pg=await pdf.getPage(i);const ct=await pg.getTextContent();txt+=ct.items.map(it=>it.str).join(" ")+"\n";}
    extractText = txt.trim();
    if(!extractFolder) extractFolder = file.name.replace(".pdf","").slice(0,40);
    renderExtract();
  } catch(err) { alert("خطا در خواندن PDF: "+err.message); }
  e_.target.value="";
}

async function doExtractSentences() {
  if(!extractText.trim()) return;
  extractItems=[]; extractSelected={}; extractProgress={current:0,total:1,active:true};
  renderExtract();

  const targetLevels = Object.keys(extractLevels).filter(k=>extractLevels[k]);
  if(!targetLevels.length) { alert("لطفاً حداقل یک سطح انتخاب کنید!"); extractProgress={current:0,total:0,active:false}; renderExtract(); return; }

  const PROMPT = `You are a German language teacher. Extract sentences from this text that match CEFR levels: ${targetLevels.join(", ")}.

Rules:
- Each sentence must have at least 3 words
- Copy sentences EXACTLY from the source text
- Only include complete sentences (not fragments)
- "german": exact sentence from text
- "translation": Persian translation  
- "level": CEFR level (${targetLevels.join("/")})

Extract as many matching sentences as possible (up to 30).
Respond ONLY with valid JSON array, no markdown:
[{"german":"Ich gehe heute zur Schule.","translation":"من امروز به مدرسه می‌روم.","level":"A1"}]
Text: ${extractText.slice(0,4000)}`;

  try {
    const raw = await askAI(PROMPT);
    const clean = raw.replace(/\`\`\`json|\`\`\`/g,"").trim();
    const parsed = JSON.parse(clean);
    extractItems = parsed;
    parsed.forEach((_,i)=>{extractSelected[i]=true;});
  } catch(err) { alert("خطا: "+err.message); }
  extractProgress={current:0,total:0,active:false};
  renderExtract();
}

async function doExtract() {
  if(!extractText.trim()) return;
  const targetLevels = Object.keys(extractLevels).filter(k=>extractLevels[k]);
  if(!targetLevels.length) { alert("لطفاً حداقل یک سطح انتخاب کنید!"); return; }
  extractItems=[]; extractSelected={}; extractProgress={current:0,total:0,active:true};
  renderExtract();

  const PROMPT = src => `You are an expert German teacher and lexicographer. Extract 12-25 unique vocabulary items from this text.

FOR VERBS: ALWAYS extract verbs with their preposition and case from context.
Format: preposition + jdn./jdm./etw.(Kasus) + Verb-Infinitiv
Examples: "Helfen Sie mir" -> "jdm. helfen", "Er glaubt an die Wiedergeburt" -> "an etw. (Akk.) glauben"
If no preposition, just the infinitive: "schlafen"

FOR NOUNS: Always include article: "die Wiedergeburt", "der Tod"
FOR ADJECTIVES/ADVERBS: as-is: "wunderbar", "ploetzlich"

ONLY extract items matching CEFR levels: ${targetLevels.join(", ")}

CRITICAL for example field: Copy the EXACT original sentence from the source text where this word appears. Do NOT create a new sentence. Then add Persian translation in parentheses after it.
translation field: Persian only.

Respond ONLY with valid JSON array, no markdown:
[{"german":"jdm. helfen","translation":"به کسی کمک کردن","example":"Helfen Sie mir bitte. (لطفاً به من کمک کنید.)","level":"A1"}]
Text: ${src}`;

  try {
    const CHUNK=3000;
    const chunks=[];
    for(let i=0;i<extractText.length;i+=CHUNK) chunks.push(extractText.slice(i,i+CHUNK));
    extractProgress.total=chunks.length;
    let all=[];
    for(let ci=0;ci<chunks.length;ci++){
      extractProgress.current=ci;
      renderExtract();
      const raw=await askAI(PROMPT(chunks[ci]));
      const clean=raw.replace(/```json|```/g,"").trim();
      try{const parsed=JSON.parse(clean);all=[...all,...parsed];}catch{}
      extractProgress.current=ci+1;
    }
    const seen=new Set();
    all=all.filter(v=>{const k=v.german.toLowerCase();if(seen.has(k))return false;seen.add(k);return true;});
    extractItems=all;
    all.forEach((_,i)=>{extractSelected[i]=true;});
  } catch(err) { alert("خطا: "+err.message); }
  extractProgress={current:0,total:0,active:false};
  renderExtract();
}

function doAddSelected() {
  const fName = extractFolder.trim()||(extractMode==="sentences"?"جملات ":"متن ")+new Date().toLocaleDateString("fa-IR");
  const existing = new Set(cards.map(c=>c.german.toLowerCase()));
  const toAdd = extractItems.filter((_,i)=>extractSelected[i]).filter(v=>!existing.has(v.german.toLowerCase()))
    .map(v=>({id:Date.now().toString()+Math.random(),german:v.german,translation:v.translation,example:v.example||"",p:v.level||"B1",box:1,nextDate:today(),created:today(),folder:fName}));
  if(!toAdd.length){alert("همه لغات انتخاب شده از قبل موجود بودند!");return;}
  cards=[...cards,...toAdd];
  if(!folders.includes(fName)){folders.push(fName);saveFolders();}
  saveCards();
  extractAddedMsg=true;
  renderExtract(); updateStats();
  setTimeout(()=>{extractAddedMsg=false;extractItems=[];extractText="";extractFolder="";extractSelected={};renderExtract();},2000);
}

function setTheme(theme) {
  const app = document.getElementById('app');
  if(!app) return;
  if(theme === 'light') {
    app.setAttribute('data-theme', 'light');
  } else {
    app.removeAttribute('data-theme');
  }
}

loadData();
if(settings.theme) setTheme(settings.theme);
render();
